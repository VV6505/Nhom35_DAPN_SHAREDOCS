<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test LocalStorage - UTE Document Share</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .header h1 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .status {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }
        
        .status.logged-in {
            background: #10b981;
            color: white;
        }
        
        .status.logged-out {
            background: #ef4444;
            color: white;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .card h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        
        .info-row:last-child {
            border-bottom: none;
        }
        
        .info-label {
            font-weight: 600;
            color: #666;
        }
        
        .info-value {
            color: #333;
            font-weight: 500;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
            margin: 5px;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
        }
        
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        
        .btn-danger:hover {
            background: #dc2626;
        }
        
        .btn-success {
            background: #10b981;
            color: white;
        }
        
        .btn-success:hover {
            background: #059669;
        }
        
        .console {
            background: #1e293b;
            color: #10b981;
            padding: 20px;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            max-height: 400px;
            overflow-y: auto;
            line-height: 1.6;
        }
        
        .console-line {
            margin: 5px 0;
        }
        
        .console-error {
            color: #ef4444;
        }
        
        .console-warning {
            color: #f59e0b;
        }
        
        .console-info {
            color: #3b82f6;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .badge-sv {
            background: #dbeafe;
            color: #1e40af;
        }
        
        .badge-gv {
            background: #fef3c7;
            color: #92400e;
        }
        
        .badge-admin {
            background: #fce7f3;
            color: #9f1239;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧪 Test LocalStorage Authentication</h1>
            <p>Công cụ kiểm tra và debug localStorage cho hệ thống đăng nhập</p>
            <div style="margin-top: 10px;">
                <span class="status" id="loginStatus">Đang kiểm tra...</span>
            </div>
        </div>
        
        <div class="grid">
            <div class="card">
                <h2>👤 Thông tin người dùng</h2>
                <div id="userInfoDisplay">
                    <div class="empty-state">Chưa có thông tin đăng nhập</div>
                </div>
            </div>
            
            <div class="card">
                <h2>⏰ Thông tin phiên</h2>
                <div id="sessionInfo">
                    <div class="empty-state">Chưa có phiên đăng nhập</div>
                </div>
            </div>
            
            <div class="card">
                <h2>🔧 Thao tác</h2>
                <button class="btn btn-primary" onclick="refreshData()">🔄 Làm mới dữ liệu</button>
                <button class="btn btn-success" onclick="testLogin()">✅ Test đăng nhập</button>
                <button class="btn btn-danger" onclick="clearStorage()">🗑️ Xóa localStorage</button>
                <button class="btn btn-primary" onclick="exportData()">📥 Export JSON</button>
                <hr style="margin: 15px 0;">
                <button class="btn btn-primary" onclick="goToLogin()">🔐 Đến trang đăng nhập</button>
                <button class="btn btn-primary" onclick="goToHome()">🏠 Đến trang chủ</button>
            </div>
            
            <div class="card">
                <h2>📊 Raw Data</h2>
                <div id="rawData" style="font-family: monospace; font-size: 12px; word-break: break-all;">
                    <div class="empty-state">Không có dữ liệu</div>
                </div>
            </div>
        </div>
        
        <div class="card">
            <h2>💻 Console Log</h2>
            <div class="console" id="consoleLog">
                <div class="console-line">Sẵn sàng để test...</div>
            </div>
        </div>
    </div>
    
    <script src="/js/auth.js"></script>
    <script>
        let consoleLines = [];
        
        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const line = `[${timestamp}] ${message}`;
            consoleLines.push({ line, type });
            
            const consoleLog = document.getElementById('consoleLog');
            const div = document.createElement('div');
            div.className = `console-line console-${type}`;
            div.textContent = line;
            consoleLog.appendChild(div);
            consoleLog.scrollTop = consoleLog.scrollHeight;
            
            console.log(message);
        }
        
        function updateDisplay() {
            // Update login status
            const statusEl = document.getElementById('loginStatus');
            if (AuthManager.isLoggedIn()) {
                statusEl.textContent = '✅ Đã đăng nhập';
                statusEl.className = 'status logged-in';
                log('Trạng thái: Đã đăng nhập', 'success');
            } else {
                statusEl.textContent = '❌ Chưa đăng nhập';
                statusEl.className = 'status logged-out';
                log('Trạng thái: Chưa đăng nhập', 'warning');
            }
            
            // Update user info
            const userInfo = AuthManager.getUserInfo();
            const userInfoDisplay = document.getElementById('userInfoDisplay');
            
            if (userInfo) {
                const roleBadge = userInfo.LoaiNguoiDung === 'SinhVien' ? 'badge-sv' : 
                                 userInfo.LoaiNguoiDung === 'GiangVien' ? 'badge-gv' : 'badge-admin';
                
                userInfoDisplay.innerHTML = `
                    <div class="info-row">
                        <span class="info-label">Tên tài khoản:</span>
                        <span class="info-value">${userInfo.TenTaiKhoan}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Tên người dùng:</span>
                        <span class="info-value">${userInfo.TenNguoiDung}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Loại người dùng:</span>
                        <span class="badge ${roleBadge}">${userInfo.LoaiNguoiDung}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Email:</span>
                        <span class="info-value">${userInfo.Email || 'N/A'}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Điểm tích lũy:</span>
                        <span class="info-value">⭐ ${userInfo.DiemTichLuy}</span>
                    </div>
                `;
                log(`Hiển thị thông tin: ${userInfo.TenNguoiDung}`, 'info');
            } else {
                userInfoDisplay.innerHTML = '<div class="empty-state">Chưa có thông tin đăng nhập</div>';
            }
            
            // Update session info
            const sessionInfo = document.getElementById('sessionInfo');
            const loginTime = AuthManager.getLoginTime();
            
            if (loginTime) {
                const now = new Date();
                const diffMs = now - loginTime;
                const diffMins = Math.floor(diffMs / 60000);
                const diffHours = (diffMs / 3600000).toFixed(2);
                const isExpired = AuthManager.isSessionExpired();
                
                sessionInfo.innerHTML = `
                    <div class="info-row">
                        <span class="info-label">Thời gian đăng nhập:</span>
                        <span class="info-value">${loginTime.toLocaleString('vi-VN')}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Đã đăng nhập:</span>
                        <span class="info-value">${diffMins} phút (${diffHours} giờ)</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Trạng thái session:</span>
                        <span class="info-value" style="color: ${isExpired ? '#ef4444' : '#10b981'}">
                            ${isExpired ? '❌ Đã hết hạn' : '✅ Còn hiệu lực'}
                        </span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Timeout (2h):</span>
                        <span class="info-value">${isExpired ? 'Đã quá hạn' : 'Chưa hết hạn'}</span>
                    </div>
                `;
                
                if (isExpired) {
                    log('⚠️ Session đã hết hạn!', 'warning');
                }
            } else {
                sessionInfo.innerHTML = '<div class="empty-state">Chưa có phiên đăng nhập</div>';
            }
            
            // Update raw data
            const rawData = document.getElementById('rawData');
            const allData = {
                userInfo: localStorage.getItem('userInfo'),
                isLoggedIn: localStorage.getItem('isLoggedIn'),
                loginTime: localStorage.getItem('loginTime')
            };
            
            rawData.innerHTML = `<pre>${JSON.stringify(allData, null, 2)}</pre>`;
        }
        
        function refreshData() {
            log('🔄 Đang làm mới dữ liệu...', 'info');
            updateDisplay();
            log('✅ Đã làm mới dữ liệu', 'success');
        }
        
        function testLogin() {
            log('🧪 Bắt đầu test đăng nhập...', 'info');
            
            const testUser = {
                MaTaiKhoan: "TK999",
                TenTaiKhoan: "test_user",
                MaVaiTro: "VT003",
                TenVaiTro: "Sinh viên",
                LoaiNguoiDung: "SinhVien",
                MaNguoiDung: "SV999",
                TenNguoiDung: "Nguyễn Văn Test",
                Email: "test@student.ute.edu.vn",
                DiemTichLuy: 100
            };
            
            if (AuthManager.saveUserInfo(testUser)) {
                log('✅ Đã lưu thông tin test user', 'success');
                updateDisplay();
            } else {
                log('❌ Lỗi khi lưu thông tin', 'error');
            }
        }
        
        function clearStorage() {
            if (confirm('Bạn có chắc chắn muốn xóa toàn bộ localStorage?')) {
                log('🗑️ Đang xóa localStorage...', 'warning');
                AuthManager.clearUserInfo();
                log('✅ Đã xóa localStorage', 'success');
                updateDisplay();
            }
        }
        
        function exportData() {
            const userInfo = AuthManager.getUserInfo();
            if (userInfo) {
                const dataStr = JSON.stringify(userInfo, null, 2);
                const dataBlob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(dataBlob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `userInfo_${new Date().getTime()}.json`;
                link.click();
                log('📥 Đã export dữ liệu', 'success');
            } else {
                alert('Không có dữ liệu để export!');
                log('❌ Không có dữ liệu để export', 'error');
            }
        }
        
        function goToLogin() {
            window.location.href = '/Auth/Login';
        }
        
        function goToHome() {
            window.location.href = '/Home/Index';
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            log('🚀 Trang test đã được load', 'info');
            updateDisplay();
            
            // Auto refresh every 5 seconds
            setInterval(() => {
                updateDisplay();
            }, 5000);
        });
    </script>
</body>
</html>
